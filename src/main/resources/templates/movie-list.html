<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Baza Filmów</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="mb-4">Baza Filmów Kinomana</h2>
    <a href="/movies/add" class="btn btn-primary mb-3">Dodaj nowy film</a>

    <div class="row">
        <div class="col-md-4 mb-4" th:each="m : ${movies}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${m.title}">Tytuł</h5>
                    <h6 class="card-subtitle mb-2 text-muted" th:text="${m.director} + ' (' + ${m.releaseYear} + ')'">Reżyser (Rok)</h6>
                    <span class="badge bg-secondary mb-2" th:text="${m.genre}">Gatunek</span>
                    <p class="card-text" th:text="${m.description}">Opis</p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
